syntax = "proto3";

import "buf/validate/validate.proto";

package auth.v1;

option go_package = "github.com/chilly266futon/exchange-service-contracts/gen/pb/auth/v1;authv1";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message RegisterRequest {
  string email = 1    [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
  string username = 3 [(buf.validate.field).string.min_len = 3];
}

message RegisterResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true]; // UUID
}

message LoginRequest {
  string email = 1    [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
}

message LoginResponse {
  string access_token   = 1;
  string refresh_token  = 2;
  string user_id        = 3 [(buf.validate.field).string.uuid = true]; // UUID
  repeated string roles = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3 [(buf.validate.field).string.uuid = true]; // UUID
  repeated string roles = 4;
}

message ValidateTokenRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message ValidateTokenResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true]; // UUID
  repeated string roles = 2;
  bool valid = 3;
}